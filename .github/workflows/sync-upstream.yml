name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  sync:
    name: Sync from openclaw/openclaw
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main

      - name: Check sync status
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          if [ "$BEHIND" = "0" ]; then
            echo "Already up to date with upstream ($(git rev-parse --short HEAD))."
          else
            echo "$BEHIND commits behind upstream/main @ $UPSTREAM_SHA"
          fi

      - name: Attempt auto-merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git merge upstream/main --no-edit \
            -m "chore: sync upstream openclaw/openclaw @ ${{ steps.check.outputs.upstream_sha }}"
          echo "status=clean" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Push merged changes
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'clean'
        run: |
          git push origin main
          echo "✅ Auto-merged and pushed ${{ steps.check.outputs.behind }} commits from upstream."

      # --- Conflict fallback: push upstream as a branch, open a PR ---

      - name: Prepare conflict branch
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status != 'clean'
        id: conflict
        run: |
          git merge --abort 2>/dev/null || true
          BRANCH="sync/upstream-${{ github.run_id }}"
          git checkout -b "$BRANCH" upstream/main
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open conflict PR
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status != 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.conflict.outputs.branch }}" \
            --title "⚠️ Upstream sync needs manual review (${{ steps.check.outputs.behind }} commits)" \
            --body "$(cat <<'EOF'
          Auto-merge from [openclaw/openclaw](https://github.com/openclaw/openclaw) failed due to conflicts.

          **${{ steps.check.outputs.behind }} commits** from upstream \`main\` @ \`${{ steps.check.outputs.upstream_sha }}\` need to be merged manually.

          ## What to check before merging

          Our custom code lives in these directories — resolve any conflicts here carefully:

          | Path | What it is |
          |------|------------|
          | `extensions/paperclip-orchestration/` | Our Paperclip integration extension |
          | `src/agents/pi-embedded-runner/run/attempt.ts` (lines 630–657) | Hook injection point |
          | `src/gateway/protocol/index.ts` | Gateway protocol (watch for new method conflicts) |

          Everything else can be accepted from upstream as-is.

          ## To merge locally

          \`\`\`bash
          git fetch origin
          git checkout main
          git merge origin/${{ steps.conflict.outputs.branch }}
          # Resolve conflicts, then:
          git push origin main
          \`\`\`
          EOF
          )" \
            --label "upstream-sync"
